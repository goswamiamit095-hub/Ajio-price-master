
<!DOCTYPE html>
<html>
<head>
  <title>Pricing Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px 0;
      width: 220px;
    }

    button {
      padding: 10px 15px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      font-size: 24px;
      color: darkblue;
    }

    #details {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>Pricing Calculator</h1>

  <label>TP:</label><br>
  <input type="number" id="tp"><br>

  <label>Target Margin (%):</label><br>
  <input type="number" id="margin"><br>

  <button onclick="calculate()">Calculate SP</button>

  <h2 id="result"></h2>
  <div id="details"></div>

  <script src="script.js"></script>
</body>
</html>
