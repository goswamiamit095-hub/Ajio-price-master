<div class="Price calculator">

<h2>Pricing Calculator</h2>

<div class="inputs">
<label>TP</label>
<input type="number" id="tp">

<label>Target Margin (%)</label>
<input type="number" id="target">

<button onclick="calculate()">Calculate SP</button>
</div>

<table class="result-table">

<thead>
<tr>
<th>SP</th>
<th>Ajio Margin</th>
<th>GST1</th>
<th>Purchase Price</th>
<th>GST2</th>
<th>Invoice</th>
<th>Marketing</th>
<th>Dispatch</th>
<th>Payout</th>
</tr>
</thead>

<tbody>
<tr>
<td id="sp"></td>
<td id="margin"></td>
<td id="gst1"></td>
<td id="pp"></td>
<td id="gst2"></td>
<td id="invoice"></td>
<td id="marketing"></td>
<td id="dispatch"></td>
<td id="payout"></td>
</tr>
</tbody>

</table>

</div>
