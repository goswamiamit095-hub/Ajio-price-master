<!DOCTYPE html>
<html>
<head>
  <title>Search SKU</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="search.html" class="active">Search</a>
  <a href="calculator.html">Calculator</a>
</div>

<h2>Search Product</h2>

<input id="searchInput" placeholder="ERP SKU / Jio Code">
<button onclick="searchProduct()">Search</button>

<pre id="result"></pre>

<script src="script.js"></script>

<script>
async function searchProduct() {
  await loadData();

  let val = document.getElementById("searchInput").value.toLowerCase();

  let found = globalData.find(d =>
    d.product?.toLowerCase().includes(val) ||
    d.jio?.toLowerCase().includes(val)
  );

  document.getElementById("result").innerText =
    found ? JSON.stringify(found, null, 2) : "Not Found";
}
</script>

</body>
</html>
