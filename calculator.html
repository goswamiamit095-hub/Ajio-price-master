<!DOCTYPE html>
<html>
<body>

<h2>Calculator</h2>

<input id="tp" placeholder="TP">
<input id="margin" placeholder="Margin">

<button onclick="calc()">Calculate</button>

<pre id="out"></pre>

<script src="script.js"></script>

<script>
function calc(){
 let tp = parseFloat(document.getElementById("tp").value);
 let m = parseFloat(document.getElementById("margin").value)/100;

 let sp = findSP(tp,m);
 let data = processRow({TP:tp},m);

 document.getElementById("out").innerText = JSON.stringify(data,null,2);
}
</script>

</body>
</html>
