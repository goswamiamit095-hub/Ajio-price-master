<!DOCTYPE html>
<html>
<body>

<h2>Compare</h2>

<input id="tp" placeholder="TP">
<input id="m1" placeholder="M1">
<input id="m2" placeholder="M2">
<input id="m3" placeholder="M3">

<button onclick="run()">Compare</button>

<div id="res"></div>

<script src="script.js"></script>

<script>
function run(){
 let tp=parseFloat(tp.value);

 let arr=[m1.value,m2.value,m3.value];

 let html="";

 arr.forEach(m=>{
   let sp=findSP(tp,m/100);
   html+=`<p>${m}% → SP ${sp}</p>`;
 });

 res.innerHTML=html;
}
</script>

</body>
</html>
